<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enter lead demographic and firmographic details to qualify business leads using the Lead Qualification Agent.">
    <title>Qualify Lead - AI-Powered Lead Qualification Agent</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <!-- Application Header -->
        <header>
            <div class="logo-container">
                <a href="./index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
                    <img src="./assets/logo.png" alt="Lead Qualification Agent Logo" class="logo-img">
                    <span class="brand-name">LeadQualifier AI</span>
                </a>
            </div>
            <nav style="display: flex; gap: 20px;">
                <a href="./index.html" class="nav-link">Home</a>
                <a href="./dashboard.html" class="nav-link">Dashboard</a>
                <a href="./lead-form.html" class="nav-link active" style="color: var(--text-primary); border-bottom: 2px solid var(--accent-teal); padding-bottom: 4px;">New Lead</a>
                <a href="./history.html" class="nav-link">History</a>
            </nav>
        </header>

        <!-- Main Form Section -->
        <main>
            <div class="form-card">
                <div class="form-header">
                    <h2 class="form-title">Lead Qualification Profile</h2>
                    <p class="form-subtitle">Provide details about the prospect to analyze lead conversion likelihood.</p>
                </div>

                <form id="lead-qualification-form" novalidate>
                    <div class="form-grid">
                        
                        <!-- Lead Name -->
                        <div class="form-group">
                            <label for="leadName">Lead Name *</label>
                            <input type="text" id="leadName" name="leadName" class="form-control" placeholder="e.g. John Doe" required>
                        </div>

                        <!-- Company Name -->
                        <div class="form-group">
                            <label for="companyName">Company Name *</label>
                            <input type="text" id="companyName" name="companyName" class="form-control" placeholder="e.g. Acme Corp" required>
                        </div>

                        <!-- Industry -->
                        <div class="form-group">
                            <label for="industry">Industry *</label>
                            <select id="industry" name="industry" class="form-control" required>
                                <option value="" disabled selected>Select industry</option>
                                <option value="Technology">Technology</option>
                                <option value="Finance">Finance</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Education">Education</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Retail">Retail</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Job Role -->
                        <div class="form-group">
                            <label for="jobRole">Job Role *</label>
                            <input type="text" id="jobRole" name="jobRole" class="form-control" placeholder="e.g. VP of Sales" required>
                        </div>

                        <!-- Company Size -->
                        <div class="form-group">
                            <label for="companySize">Company Size (Employees) *</label>
                            <input type="number" id="companySize" name="companySize" class="form-control" placeholder="e.g. 250" min="1" required>
                        </div>

                        <!-- Annual Revenue -->
                        <div class="form-group">
                            <label for="annualRevenue">Annual Revenue (USD) *</label>
                            <input type="number" id="annualRevenue" name="annualRevenue" class="form-control" placeholder="e.g. 5000000" min="0" step="any" required>
                        </div>

                        <!-- Budget -->
                        <div class="form-group">
                            <label for="budget">Budget (USD) *</label>
                            <input type="number" id="budget" name="budget" class="form-control" placeholder="e.g. 80000" min="0" step="any" required>
                        </div>

                        <!-- Timeline -->
                        <div class="form-group">
                            <label for="timeline">Timeline *</label>
                            <select id="timeline" name="timeline" class="form-control" required>
                                <option value="" disabled selected>Select purchase timeline</option>
                                <option value="Immediate">Immediate (Within 30 Days)</option>
                                <option value="1-3 Months">1 to 3 Months</option>
                                <option value="3-6 Months">3 to 6 Months</option>
                                <option value="6+ Months">6+ Months</option>
                            </select>
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="e.g. john.doe@acme.com" required>
                        </div>

                        <!-- Phone Number -->
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number *</label>
                            <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" placeholder="e.g. +1 (555) 019-2834" required>
                        </div>

                        <!-- Requirement -->
                        <div class="form-group full-width">
                            <label for="requirement">Requirement *</label>
                            <textarea id="requirement" name="requirement" class="form-control" placeholder="Describe the lead's business requirements and goals..." required></textarea>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="form-actions">
                        <button type="reset" class="btn btn-secondary" id="btn-reset">Reset</button>
                        <button type="submit" class="btn btn-primary" id="btn-submit">
                            Analyze
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            &copy; 2026 LeadQualifier AI. All rights reserved. Phase 1 Mock Environment.
        </footer>
    </div>

    <!-- Toast Notification for feedback -->
    <div id="toast" class="toast">
        <div id="toast-icon"></div>
        <div id="toast-message" class="toast-message"></div>
    </div>

    <!-- Loading Animation Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner-box">
            <div class="spinner-outer"></div>
            <div class="spinner-inner"></div>
        </div>
        <div class="loading-text">Analyzing Lead Profile...</div>
    </div>

    <!-- Scripts -->
    <script src="./js/config.js"></script>
    <script src="./js/form.js"></script>
</body>
</html>
